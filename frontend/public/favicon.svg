<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0d1829"/>
      <stop offset="100%" stop-color="#152340"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#5B8AF5"/>
      <stop offset="100%" stop-color="#2EC4E8"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#5B8AF5" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#5B8AF5"/>
      <stop offset="70%"  stop-color="#2EC4E8"/>
      <stop offset="100%" stop-color="#2EC4E8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="100" fill="none"
        stroke="#5B8AF5" stroke-width="2" opacity="0.15"/>

  <!-- Waveform bars — 7 bars, arch pattern, centered at y=268 -->
  <!-- bar width=40, gap=14, total=(7×40)+(6×14)=364, startX=(512-364)/2=74 -->
  <rect x="74"  y="228" width="40" height="80"  rx="20" fill="url(#bar)" opacity="0.55"/>
  <rect x="128" y="188" width="40" height="160" rx="20" fill="url(#bar)" opacity="0.70"/>
  <rect x="182" y="148" width="40" height="240" rx="20" fill="url(#bar)" opacity="0.85"/>
  <rect x="236" y="118" width="40" height="300" rx="20" fill="url(#bar)" opacity="1.00"/>
  <rect x="290" y="148" width="40" height="240" rx="20" fill="url(#bar)" opacity="0.85"/>
  <rect x="344" y="188" width="40" height="160" rx="20" fill="url(#bar)" opacity="0.70"/>
  <rect x="398" y="228" width="40" height="80"  rx="20" fill="url(#bar)" opacity="0.55"/>

  <!-- Wave line through the bars -->
  <path d="M 54 268
           C 100 268, 108 200, 148 200
           C 188 200, 196 336, 236 336
           C 276 336, 284 180, 324 180
           C 364 180, 372 310, 412 310
           C 432 310, 448 268, 458 268"
        fill="none" stroke="url(#wave)" stroke-width="5" stroke-linecap="round"/>
</svg>
