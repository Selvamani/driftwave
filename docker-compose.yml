version: "3.9"

services:

  # ── NAVIDROME ──────────────────────────────────────────
  navidrome:
    image: deluan/navidrome:latest
    container_name: driftwave-navidrome
    restart: unless-stopped
    ports:
      - "${NAVIDROME_PORT:-4533}:4533"
    volumes:
      - /mnt/e/SubsonicMusicRepo:/music:ro
      - navidrome_data:/data
    environment:
      ND_SCANSCHEDULE: "1h"
      ND_LOGLEVEL: "info"
      ND_SESSIONTIMEOUT: "24h"
      ND_BASEURL: ""
      ND_ENABLEINSTANTMIX: "true"
      ND_INSTANTMIXPROVIDER: "audiomuse"
      ND_PLUGINSFOLDER: "/data/plugins"
    networks:
      - driftwave

  # ── QDRANT ─────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: driftwave-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - driftwave

  # ── OLLAMA ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: driftwave-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - driftwave
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama-init:
    image: ollama/ollama:latest
    container_name: driftwave-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    # pull is a no-op if the model is already in the volume
    entrypoint: ["ollama", "pull"]
    command: ["${OLLAMA_MODEL:-gemma2:9b}"]
    networks:
      - driftwave
    restart: "no"

  # ── REDIS ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: driftwave-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - driftwave

  # ── POSTGRES ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: driftwave-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-driftwave}
      POSTGRES_USER: ${POSTGRES_USER:-driftwave}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-driftwave}
    networks:
      - driftwave
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-driftwave}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── INDEXER ────────────────────────────────────────────
  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    image: driftwave-indexer
    container_name: driftwave-indexer
    restart: "no"             # run manually or via make
    volumes:
      - /mnt/e/SubsonicMusicRepo:/music:ro
      - ./indexer:/app
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_HOST: http://ollama:11434
      NAVIDROME_URL: http://navidrome:4533
      NAVIDROME_USER: ${NAVIDROME_USER}
      NAVIDROME_PASS: ${NAVIDROME_PASS}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://${POSTGRES_USER:-driftwave}:${POSTGRES_PASSWORD:-driftwave}@postgres:5432/${POSTGRES_DB:-driftwave}
      MUSIC_DIR: /music
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:9b}
      CUDA_VISIBLE_DEVICES: ""
    depends_on:
      - qdrant
      - ollama
      - redis
      - postgres
    networks:
      - driftwave
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── API ────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: driftwave-api
    container_name: driftwave-api
    restart: unless-stopped
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./api:/app
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_HOST: http://ollama:11434
      NAVIDROME_URL: http://navidrome:4533
      NAVIDROME_PUBLIC_URL: ${NAVIDROME_PUBLIC_URL:-http://localhost:4533}
      NAVIDROME_USER: ${NAVIDROME_USER}
      NAVIDROME_PASS: ${NAVIDROME_PASS}
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://${POSTGRES_USER:-driftwave}:${POSTGRES_PASSWORD:-driftwave}@postgres:5432/${POSTGRES_DB:-driftwave}
      JWT_SECRET: ${JWT_SECRET}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:9b}
      ENV: ${ENV:-production}
    depends_on:
      - qdrant
      - navidrome
      - ollama
      - redis
      - postgres
    networks:
      - driftwave

  # ── FRONTEND ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_NAVIDROME_URL: ${VITE_NAVIDROME_URL:-http://localhost:4533}
    image: driftwave-frontend
    container_name: driftwave-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - api
    networks:
      - driftwave

networks:
  driftwave:
    driver: bridge

volumes:
  navidrome_data:
  qdrant_data:
  ollama_data:
  redis_data:
  postgres_data:
