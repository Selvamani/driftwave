name: driftwave
description: Self-hosted AI music player with natural language discovery
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP
  dio: ^5.4.3+1
  retrofit: ^4.1.0

  # Audio playback
  just_audio: ^0.9.40
  audio_service: ^0.18.13
  just_audio_cache: ^0.0.2

  # Local storage / offline
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # UI
  cached_network_image: ^3.3.1
  flutter_slidable: ^3.1.0

  # Utils
  shared_preferences: ^2.2.3
  crypto: ^3.0.3
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0
  isar_generator: ^3.1.0+1
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
